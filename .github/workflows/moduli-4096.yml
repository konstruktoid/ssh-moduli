---
name: Moduli 4096 bits
on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * */5"
permissions:
  contents: read
jobs:
  Generate:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Set current date as env variable
        run: echo CURRENT_DATE=$(date +'%Y%m%d') >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref }}

      - name: Install openssh-client
        run: |
          sudo apt-get install --assume-yes --no-install-recommends --update openssh-client

      - name: Generate 4096 bits moduli file
        run: |
          set -eu -o pipefail
          mkdir -p /tmp/moduli
          time ssh-keygen -M generate -O bits=4096 /tmp/moduli/moduli.4096-candidates
          time ssh-keygen -M screen -f /tmp/moduli/moduli.4096-candidates /tmp/moduli/moduli.4096

      - name: Upload moduli artifact
        if: ${{ github.ref_name == 'main' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: moduli.4096
          path: /tmp/moduli/moduli.4096
